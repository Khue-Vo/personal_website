<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Senior Capstone Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/font.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header-image">
      <canvas id="header-canvas"></canvas>
    </div>
    <script>
      let $THEME = null;

      function selectTheme(theme) {
        const node = document.documentElement;
        if (theme === "system") {
          localStorage.removeItem("theme");
        } else {
          localStorage.setItem("theme", theme);
        }
        node.setAttribute("data-theme", theme);
        $THEME = theme;
      }

      selectTheme(localStorage.getItem("theme") || "system");
      document.documentElement.setAttribute("data-initial-load", "true");

      if (history.scrollRestoration) {
        history.scrollRestoration = 'manual';
      }
    </script>
    <script src="{{ url_for('static', filename='scripts/htmx-bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/app.js') }}"></script>

    <div class="container">
        <div class="header">
            <a href="{{ url_for('index') }}">Khue H. Vo</a>'s Personal Space
        </div>

        <div class="navigation">
            <a href="{{ url_for('index') }}">About Me</a>
            <a href="{{ url_for('projects') }}">Projects & Experiences</a>
            <a href="{{ url_for('resume') }}">Resume</a>
        </div>

        <div class="body">
            {% block content %}{% endblock %}
        </div>

        <div class="footer">
            <p>© 2026 Senior Capstone Portfolio | Built with Flask</p>
            <!-- Legal Attribution required by the CC BY-NC 4.0 License -->
            <p>
                Layout base design adapted from <a href="https://lucumr.pocoo.org/" target="_blank" rel="noopener">Armin Ronacher</a> (CC BY-NC 4.0)
            </p>
            <p class="theme-selector" hidden>
                Color scheme:
                <label><input type="radio" name="theme" value="system"> <span>auto</span></label>,
                <label><input type="radio" name="theme" value="light"> <span>light</span></label>,
                <label><input type="radio" name="theme" value="dark"> <span>dark</span></label>.
                <script>
                    document.querySelector('.theme-selector').removeAttribute('hidden');
                    document.querySelectorAll('input[name="theme"]').forEach(input => {
                        input.checked = input.value === $THEME;
                        input.addEventListener('change', () => {
                            selectTheme(input.value);
                        });
                    });
                </script>
            </p>
        </div>
    </div>
    <div class="footer-image">
      <canvas id="footer-canvas"></canvas>
    </div>

    <script>
      window.setTimeout(() => {
        document.documentElement.removeAttribute("data-initial-load");
      }, 0);
    </script>
</body>
</html>
